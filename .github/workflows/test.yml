name: CI

# This workflow runs the project's tests on push and pull requests to `master`.
# It demonstrates a minimal Python CI flow with dependency caching and a
# secret injected for any steps that need the Anthropic API key.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    # Expose the Anthropic API key to the job via GitHub Secrets. Add the
    # secret at: Settings → Secrets and variables → Actions → New repository secret
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      # 1) Check out the repository so we can install and run tests.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Python. Use the modern setup action and pin a tested version.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) Cache pip's download/wheel cache directory to speed up repeated runs.
      #    The cache key uses a hash of `requirements.txt` so the cache is
      #    invalidated automatically when dependencies change.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4) Upgrade pip, then install project dependencies from `requirements.txt`.
      #    Installing from a requirements file keeps CI consistent with local dev.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # 5) Run the test suite. Adjust the path if you add more tests later.
      - name: Run tests
        run: pytest -q BOSS/tests

      # Optional: upload test reports or coverage artifacts here if needed.

